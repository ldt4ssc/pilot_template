name: Validate updates

on:
  push:
    paths:
      - 'updates/**'
      - '.github/scripts/validate_updates.py'
      - '.github/workflows/validate-updates.yml'
  pull_request:
    paths:
      - 'updates/**'
      - '.github/scripts/validate_updates.py'
      - '.github/workflows/validate-updates.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate update files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate updates
        run: python .github/scripts/validate_updates.py